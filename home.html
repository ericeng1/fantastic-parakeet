<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function() {
      var t = localStorage.getItem("showoffy_theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Showoffy — What's New</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-primary: 'Bebas Neue', sans-serif;
      --font-body:    'Lato', sans-serif;
      --font-accent:  'Cormorant Garamond', serif;
      --bg:       #0f0f10;
      --surface:  #18181b;
      --surface2: #202024;
      --border:   #2a2a2e;
      --text:     #f0ede8;
      --muted:    #9a9896;
      --accent:   #c8964a;
      --accent2:  #8dbbd1;
      --danger:   #b85450;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 60% 40% at 85% 0%, rgba(200,150,74,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 40% 50% at 10% 90%, rgba(141,187,209,0.04) 0%, transparent 50%);
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left { display: flex; align-items: center; gap: 0; }

    .logo {
      font-family: var(--font-primary);
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
      margin-right: 32px;
    }

    /* Nav links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-link {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .nav-link:hover  { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--accent); }

    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .topbar-email {
      font-size: 12px;
      color: var(--muted);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-log {
      padding: 7px 16px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-log:hover { opacity: 0.87; }

    .btn-signin {
      font-size: 12px;
      color: var(--accent2);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .btn-signin:hover { color: #a8d4e8; }

    /* ── PAGE HERO ── */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 32px 36px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .hero-text h1 {
      font-family: var(--font-primary);
      font-size: clamp(40px, 6vw, 68px);
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hero-text h1 span { color: var(--accent); }

    .hero-text p {
      font-family: var(--font-accent);
      font-style: italic;
      font-size: 17px;
      color: var(--muted);
    }

    .hero-stats {
      display: flex;
      gap: 24px;
      padding-bottom: 4px;
    }

    .stat { text-align: center; }

    .stat-num {
      font-family: var(--font-primary);
      font-size: 28px;
      letter-spacing: 0.06em;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── CONTENT LAYOUT ── */
    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px 80px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 48px;
      align-items: start;
    }

    /* ── SECTION HEADERS ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: var(--font-primary);
      font-size: 22px;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .section-link {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .section-link:hover { color: var(--accent); }

    /* ── MAIN FEED (left column) ── */
    .main-feed { min-width: 0; }

    /* Feed item card */
    .feed-card {
      display: grid;
      grid-template-columns: 200px 1fr;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      animation: slideIn 0.35s ease both;
      cursor: pointer;
    }

    .feed-card:hover { background: rgba(255,255,255,0.02); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feed-card-img {
      width: 200px;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .feed-card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .feed-card:hover .feed-card-img img { transform: scale(1.04); }

    .feed-card-img .no-img {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 24px;
    }

    /* Group shot badge variant */
    .feed-card.gs-card .feed-card-img::after {
      content: '◎ Group Shot';
      position: absolute;
      top: 8px; left: 8px;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(14,14,15,0.75);
      border: 1px solid rgba(141,187,209,0.25);
      border-radius: 4px;
      padding: 3px 7px;
    }

    .feed-card.gs-card .feed-card-img { position: relative; }

    .feed-card-body {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .feed-card-eyebrow {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
    }

    .feed-card-brand {
      font-family: var(--font-primary);
      font-size: 20px;
      letter-spacing: 0.05em;
      line-height: 1.1;
    }

    .feed-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .meta-pill {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      letter-spacing: 0.03em;
    }

    .feed-card-date {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* Load more */
    .load-more-wrap {
      text-align: center;
      padding: 28px 0 8px;
    }

    .btn-load-more {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 28px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-load-more:hover { border-color: var(--accent); color: var(--accent); }
    .btn-load-more:disabled { opacity: 0.3; cursor: not-allowed; }

    .feed-end-msg {
      text-align: center;
      padding: 24px 0;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--border);
    }

    /* ── SIDEBAR (right column) ── */
    .sidebar { display: flex; flex-direction: column; gap: 32px; }

    /* My Collection strip */
    .my-strip { }

    .my-strip-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .my-strip-card {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface2);
      border: 1px solid var(--border);
      position: relative;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, transform 0.15s;
    }

    .my-strip-card:hover { border-color: #444; transform: scale(1.02); }

    .my-strip-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .my-strip-card .no-img {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 22px;
    }

    .my-strip-card .strip-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      font-size: 10px;
      color: rgba(240,237,232,0.85);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .my-strip-see-all {
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px dashed var(--border);
      background: none;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .my-strip-see-all:hover { border-color: var(--accent); color: var(--accent); }

    /* Not logged in placeholder */
    .signin-prompt {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 20px;
      text-align: center;
    }

    .signin-prompt h3 {
      font-family: var(--font-primary);
      font-size: 20px;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .signin-prompt p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
      font-family: var(--font-accent);
      font-style: italic;
    }

    .btn-join {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 8px;
    }

    .btn-join:hover { opacity: 0.87; }

    .btn-join-secondary {
      display: block;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 12px;
      text-decoration: none;
      text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-join-secondary:hover { border-color: var(--muted); color: var(--text); }

    /* Makers sidebar block */
    .makers-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .maker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }

    .maker-row:hover { border-color: #444; }

    .maker-row-name {
      font-family: var(--font-primary);
      font-size: 15px;
      letter-spacing: 0.04em;
    }

    .maker-row-count {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Group shots sidebar strip */
    .gs-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .gs-strip-thumb {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      text-decoration: none;
      display: block;
    }

    .gs-strip-thumb:hover { border-color: var(--accent2); transform: scale(1.04); }

    .gs-strip-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .shimmer-card {
      height: 150px;
      border-radius: 8px;
      margin-bottom: 1px;
    }

    /* ── MOBILE ── */
    @media (max-width: 720px) {
      .topbar { padding: 0 16px; }
      .nav-links { display: none; }
      .hero { padding: 28px 16px 24px; }
      .hero-stats { gap: 16px; }
      .content { grid-template-columns: 1fr; padding: 0 16px 60px; gap: 32px; }
      .feed-card { grid-template-columns: 130px 1fr; }
      .feed-card-img { width: 130px; }
      .feed-card-body { padding: 14px 16px; }
      .topbar-email { display: none; }
      .sidebar { order: -1; }
      .my-strip-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* ── LIGHT THEME OVERRIDES ── */
    [data-theme="light"] {
      --bg:       #f4f1ec;
      --surface:  #ffffff;
      --surface2: #ebe8e2;
      --border:   #d6d1c8;
      --text:     #1c1a17;
      --muted:    #7a7570;
      --accent:   #b07d32;
      --accent2:  #4a8ba8;
      --danger:   #a03830;
      --input-bg: #f4f1ec;
    }

    html { transition: background 0.25s; }
    body { transition: background 0.25s, color 0.25s; }
    .topbar { transition: background 0.25s, border-color 0.25s; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="home.html" class="logo">Showoffy</a>
      <nav class="nav-links">
        <a href="my-items.html"   class="nav-link" id="nav-collection" style="display:none;">My Collection</a>
      </nav>
    </div>
    <div class="topbar-right">
      <span class="topbar-email" id="topbar-email"></span>
      <a href="dashboard.html" class="btn-log"   id="btn-log"     style="display:none;">＋ Add Item</a>
      <a href="login.html"     class="btn-signin" id="btn-signin"  style="display:none;">Sign In</a>
      <button class="nav-link" id="btn-signout"  style="display:none;">Sign Out</button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-text">
      <h1>What's <span>New</span></h1>
      <p>The latest from the Showoffy community</p>
    </div>
    <div class="hero-stats" id="hero-stats">
      <div class="stat">
        <div class="stat-num" id="stat-items">—</div>
        <div class="stat-label">Items</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-makers">—</div>
        <div class="stat-label">Makers</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-collectors">—</div>
        <div class="stat-label">Collectors</div>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- MAIN FEED -->
    <main class="main-feed">
      <div class="section-header">
        <div class="section-title">Recently Added</div>
      </div>
      <div id="main-feed-list">
        <!-- shimmer placeholders -->
        <div class="shimmer shimmer-card"></div>
        <div class="shimmer shimmer-card" style="margin-top:1px;opacity:.7"></div>
        <div class="shimmer shimmer-card" style="margin-top:1px;opacity:.4"></div>
      </div>
      <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
        <button class="btn-load-more" id="btn-load-more">Load more</button>
      </div>
      <div class="feed-end-msg" id="feed-end-msg" style="display:none;">— You're all caught up —</div>
    </main>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- My Collection / Sign-in prompt -->
      <div id="sidebar-user-zone">
        <!-- Populated by JS -->
      </div>

      <!-- Makers -->
      <div>
        <div class="section-header">
          <div class="section-title">Makers</div>
        </div>
        <div class="makers-list" id="makers-list">
          <div class="shimmer" style="height:44px;border-radius:8px;"></div>
          <div class="shimmer" style="height:44px;border-radius:8px;margin-top:10px;opacity:.7"></div>
        </div>
      </div>

      <!-- Group Shots -->
      <div id="gs-sidebar-zone" style="display:none;">
        <div class="section-header">
          <div class="section-title">Group Shots</div>
          <a href="my-items.html" class="section-link">See all →</a>
        </div>
        <div class="gs-strip" id="gs-strip"></div>
      </div>

    </aside>
  </div>

  <script type="module">
    import { supabase } from "./supabaseClient.js";
    import { syncThemeFromUser } from "./theme.js";

    const PAGE_SIZE = 12;
    let   offset    = 0;
    let   exhausted = false;
    let   loading   = false;
    let   currentUserId = null;

    // ── AUTH ──────────────────────────────────────────────────────────────────
    const { data: { session } } = await supabase.auth.getSession();
      // Fetch fresh user_metadata from server so theme preference is always current
      supabase.auth.getUser().then(({ data: { user: freshUser } }) => {
        syncThemeFromUser(freshUser?.user_metadata);
      });
    const isLoggedIn = !!session;
    currentUserId = session?.user?.id ?? null;

if (isLoggedIn) {
  const emailEl = document.getElementById("topbar-email");

  // 🔹 Fetch username from profiles table
  const { data: profile, error } = await supabase
    .from("profiles")
    .select("username")
    .eq("id", session.user.id)
    .single();

  const username = profile?.username;

  emailEl.innerHTML = `<a href="account.html" style="color:var(--muted);text-decoration:none;transition:color .2s;"
    onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'"
    >${username || session.user.email}</a>`;

  document.getElementById("btn-log").style.display     = "inline-flex";
  document.getElementById("btn-signout").style.display = "inline-flex";
  document.getElementById("nav-collection").style.display = "inline";

  document.getElementById("btn-signout").addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = "home.html";
  });
}
    else {
      document.getElementById("btn-signin").style.display = "inline-flex";
    }

    // ── STATS ────────────────────────────────────────────────────────────────
    const [
      { count: itemCount },
      { count: makerCount },
      { count: collectorCount },
    ] = await Promise.all([
      supabase.from("items").select("id", { count: "exact", head: true })
        .eq("is_private", false).is("deleted_at", null),
      supabase.from("brands").select("id", { count: "exact", head: true }),
      supabase.from("items").select("owner_id", { count: "exact", head: true })
        .is("deleted_at", null),
    ]);

    document.getElementById("stat-items").textContent      = itemCount  ?? "—";
    document.getElementById("stat-makers").textContent     = makerCount ?? "—";
    document.getElementById("stat-collectors").textContent = collectorCount ?? "—";

    // ── SIDEBAR: USER ZONE ───────────────────────────────────────────────────
    const userZone = document.getElementById("sidebar-user-zone");

    if (isLoggedIn) {
      // Show My Collection mini-strip
      const { data: myItems } = await supabase
        .from("items")
        .select("id, image_url1, image_url2, image_url3, brands(company), categories(name)")
        .eq("owner_id", currentUserId)
        .is("deleted_at", null)
        .order("created_at", { ascending: false })
        .limit(5);

        console.log("myItems:", JSON.stringify(myItems, null, 2)); 

      userZone.innerHTML = `
        <div class="section-header">
          <div class="section-title">My Collection</div>
          <a href="my-items.html" class="section-link">See all →</a>
        </div>
        <div class="my-strip-grid" id="my-strip-grid"></div>`;

      const grid = document.getElementById("my-strip-grid");

      (myItems || []).slice(0, 4).forEach(it => {
        const img   = it.image_url1 || it.image_url2 || it.image_url3;
        const label = [it.brands?.company, it.categories?.name].filter(Boolean).join(" · ");
        const card  = document.createElement("a");
        card.href         = `item.html?id=${it.id}`;
        card.className    = "my-strip-card";
        card.innerHTML    = img
          ? `<img src="${img}" alt="" loading="lazy" /><div class="strip-label">${label}</div>`
          : `<div class="no-img">◻</div><div class="strip-label">${label}</div>`;
        grid.appendChild(card);
      });

      const seeAll = document.createElement("a");
      seeAll.href      = "my-items.html";
      seeAll.className = "my-strip-see-all";
      seeAll.textContent = "All →";
      grid.appendChild(seeAll);

    } else {
      // Not logged in — sign-up prompt
      userZone.innerHTML = `
        <div class="signin-prompt">
          <h3>Join Showoffy</h3>
          <p>Log your collection, track provenance, and connect with other collectors.</p>
          <a href="login.html" class="btn-join">Create Account</a>
          <a href="login.html" class="btn-join-secondary">Sign In</a>
        </div>`;
    }

    // ── SIDEBAR: MAKERS ──────────────────────────────────────────────────────
    const { data: makers } = await supabase
      .from("brands")
      .select("id, company, first_name, last_name");

    // Get public item counts per brand
    const { data: brandCounts } = await supabase
      .from("items")
      .select("maker_id")
      .eq("is_private", false)
      .is("deleted_at", null);

    const countMap = {};
    (brandCounts || []).forEach(r => {
      countMap[r.maker_id] = (countMap[r.maker_id] || 0) + 1;
    });

    const makersList = document.getElementById("makers-list");
    makersList.innerHTML = "";

    (makers || [])
      .sort((a, b) => (countMap[b.id] || 0) - (countMap[a.id] || 0))
      .forEach(m => {
        const row = document.createElement("a");
        row.href      = `maker.html?id=${m.id}`;
        row.className = "maker-row";
        row.innerHTML = `
          <div class="maker-row-name">${m.company}</div>
          <div class="maker-row-count">${countMap[m.id] || 0} items</div>`;
        makersList.appendChild(row);
      });

    // ── SIDEBAR: GROUP SHOTS ─────────────────────────────────────────────────
    const { data: recentGs } = await supabase
      .from("group_shots")
      .select("id, url")
      .order("created_at", { ascending: false })
      .limit(6);

    if (recentGs?.length) {
      document.getElementById("gs-sidebar-zone").style.display = "block";
      const strip = document.getElementById("gs-strip");
      recentGs.forEach(gs => {
        const thumb = document.createElement("a");
        thumb.href      = `group-shot.html?id=${gs.id}`;
        thumb.className = "gs-strip-thumb";
        thumb.innerHTML = `<img src="${gs.url}" alt="" loading="lazy" />`;
        strip.appendChild(thumb);
      });
    }

    // ── MAIN FEED ────────────────────────────────────────────────────────────
    function formatDate(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function pickImg(item) {
      const candidates = [item.image_url1, item.image_url2, item.image_url3].filter(Boolean);
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    async function loadFeed() {
      if (loading || exhausted) return;
      loading = true;

      let query = supabase
        .from("items")
        .select(`
          id, variant, created_at,
          image_url1, image_url2, image_url3,
          maker_id,
          brands     ( id, company ),
          categories ( name ),
          materials  ( name )
        `)
        .eq("is_private", false)
        .is("deleted_at", null)
        .order("created_at", { ascending: false })
        .range(offset, offset + PAGE_SIZE - 1);

      // Logged-in users: exclude their own items so the feed is discovery-oriented
      // No exclusion filter — all public items appear in the feed regardless of ownership

      const { data: items, error } = await query;

      loading = false;
      const feedList = document.getElementById("main-feed-list");

      if (offset === 0) feedList.innerHTML = ""; // clear shimmer

      if (error || !items?.length) {
        if (offset === 0) {
          feedList.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--muted);font-family:var(--font-accent);font-style:italic;font-size:15px;">Nothing new yet — be the first to <a href="dashboard.html" style="color:var(--accent);text-decoration:none;">log an item</a>.</div>`;
        }
        exhausted = true;
        document.getElementById("feed-end-msg").style.display   = "block";
        document.getElementById("load-more-wrap").style.display = "none";
        return;
      }

      items.forEach((item, i) => {
        const img   = pickImg(item);
        const brand = item.brands?.company || "Unknown Brand";
        const pills = [
          item.categories?.name,
          item.materials?.name,
          item.variant && item.variant !== "none" ? item.variant : null,
        ].filter(Boolean);

        const card = document.createElement("a");
        card.href      = `item.html?id=${item.id}`;
        card.className = "feed-card";
        card.style.animationDelay = `${i * 0.04}s`;

        card.innerHTML = `
          <div class="feed-card-img">
            ${img
              ? `<img src="${img}" alt="${brand}" loading="lazy"
                  onerror="this.parentElement.innerHTML='<div class=no-img>◻</div>'" />`
              : `<div class="no-img">◻</div>`}
          </div>
          <div class="feed-card-body">
            <div class="feed-card-eyebrow">
              <a href="maker.html?id=${item.maker_id}" style="color:inherit;text-decoration:none;"
                 onclick="event.stopPropagation();">${brand}</a>
            </div>
            <div class="feed-card-brand">${brand}</div>
            <div class="feed-card-meta">
              ${pills.map(p => `<span class="meta-pill">${p}</span>`).join("")}
            </div>
            <div class="feed-card-date">${formatDate(item.created_at)}</div>
          </div>`;

        feedList.appendChild(card);
      });

      offset += items.length;

      if (items.length < PAGE_SIZE) {
        exhausted = true;
        document.getElementById("feed-end-msg").style.display   = "block";
        document.getElementById("load-more-wrap").style.display = "none";
      } else {
        document.getElementById("load-more-wrap").style.display = "block";
      }
    }

    // Load more button
    document.getElementById("btn-load-more").addEventListener("click", loadFeed);

    // Initial load
    await loadFeed();

  </script>

</body>
</html>
