<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function() {
      var t = localStorage.getItem("showoffy_theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item — Showoffy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* ── GLOBAL FONT SYSTEM ──
         Primary:   Bebas Neue           → headlines, logo, labels
         Secondary: Lato                 → body, paragraphs, UI
         Accent:    Cormorant Garamond   → prices, pull quotes, decorative
      */
      --font-primary: 'Bebas Neue', sans-serif;
      --font-body:    'Lato', sans-serif;
      --font-accent:  'Cormorant Garamond', serif;

      --bg:       #0e0e0f;
      --surface:  #161618;
      --surface2: #1e1e21;
      --border:   #2b2b2f;
      --text:     #ede9e2;
      --muted:    #9a9896;
      --accent:   #c8964a;
      --accent2:  #8dbbd1;
      --danger:   #b85450;
      --success:  #5a9e6f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .topbar-left { display: flex; align-items: center; gap: 24px; }

    .brand {
      font-family: var(--font-primary);
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
    }

    .back-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text); }

    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-email  { font-size: 12px; color: var(--muted); }

    .btn-small {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-small:hover { border-color: var(--accent); color: var(--accent); }

    /* ── STATE PAGES ── */
    .state-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      padding: 40px;
    }

    .state-page .big { font-size: 48px; }

    /* ── MAIN LAYOUT ── */
    .item-page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 56px 40px 80px;
      display: none;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-top {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 56px;
      align-items: start;
      margin-bottom: 56px;
    }

    /* ── GALLERY ── */
    .gallery { display: flex; flex-direction: column; gap: 12px; }

    .gallery-main {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: zoom-in;
      aspect-ratio: 4/3;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.3s ease;
    }

    .gallery-main:hover img { transform: scale(1.03); }

    .no-image {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 48px;
    }

    /* Thumb strip */
    .gallery-thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
    }

    .thumb {
      aspect-ratio: 1;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .thumb.active  { border-color: var(--accent); }
    .thumb:hover   { border-color: #888; }

    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Add photo tile */
    .thumb-add {
      aspect-ratio: 1;
      background: var(--surface2);
      border: 2px dashed var(--border);
      border-radius: 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.2;
    }

    .thumb-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,150,74,0.05); }
    .thumb-add .plus { font-size: 20px; font-weight: 300; }

    /* Hidden file input */
    #photo-file-input { display: none; }

    /* Upload status */
    .upload-status {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 4px;
      display: none;
    }

    .upload-status.uploading {
      display: block;
      background: rgba(141,187,209,0.1);
      border: 1px solid rgba(141,187,209,0.25);
      color: var(--accent2);
    }

    .upload-status.success {
      display: block;
      background: rgba(90,158,111,0.1);
      border: 1px solid rgba(90,158,111,0.25);
      color: var(--success);
    }

    .upload-status.error {
      display: block;
      background: rgba(184,84,80,0.1);
      border: 1px solid rgba(184,84,80,0.25);
      color: var(--danger);
    }

    /* ── META PANEL ── */
    .meta-panel { display: flex; flex-direction: column; gap: 0; }

    .meta-eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 10px;
      font-family: var(--font-body);
    }

    .meta-title {
      font-family: var(--font-primary);
      font-size: clamp(36px, 4vw, 52px);
      letter-spacing: 0.04em;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 6px;
    }

    .meta-subtitle {
      font-family: var(--font-accent);
      font-size: 20px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .privacy-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-family: var(--font-body);
      margin-bottom: 24px;
      width: fit-content;
    }

    .privacy-badge.private {
      background: rgba(184,84,80,0.12);
      border: 1px solid rgba(184,84,80,0.3);
      color: var(--danger);
    }

    .privacy-badge.public {
      background: rgba(141,187,209,0.08);
      border: 1px solid rgba(141,187,209,0.2);
      color: var(--accent2);
    }

    /* Data grid */
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .data-cell { background: var(--surface); padding: 14px 18px; }
    .data-cell.full { grid-column: 1 / -1; }

    .data-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--font-body);
      margin-bottom: 5px;
    }

    .data-value {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      font-family: var(--font-body);
    }

    .data-value.price {
      font-family: var(--font-accent);
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
    }

    /* Owner link in data grid */
    .owner-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .owner-link:hover {
      color: var(--accent2);
      text-decoration: underline;
    }

    /* Comments */
    .comments-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }

    .comments-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--font-body);
      margin-bottom: 10px;
    }

    .comments-text {
      font-family: var(--font-accent);
      font-size: 16px;
      font-style: italic;
      line-height: 1.7;
      color: #bbb;
    }

    /* ── ADD SIMILAR BUTTON ── */
    .add-similar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid rgba(141,187,209,0.35);
      background: rgba(141,187,209,0.06);
      color: var(--accent2);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
      margin-top: 10px;
    }
    .add-similar-btn:hover { border-color: var(--accent2); background: rgba(141,187,209,0.12); }

    /* ── GROUP SHOTS SECTION ── */
    .group-shots-section {
      max-width: 1080px;
      margin: 0 auto 60px;
      padding: 0 40px;
    }

    .gs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .gs-title {
      font-family: var(--font-primary);
      font-size: 22px;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .gs-subtitle {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .btn-add-gs {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-add-gs:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,150,74,0.06); }

    .gs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .gs-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }

    .gs-card:hover { border-color: #444; transform: translateY(-2px); }

    .gs-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .gs-card:hover img { transform: scale(1.03); }

    .gs-card-footer {
      padding: 10px 14px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .gs-delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .gs-delete-btn:hover { color: var(--danger); background: rgba(192,80,80,0.1); }

    .gs-empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
      font-size: 14px;
      font-family: var(--font-accent);
      font-style: italic;
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    /* Upload panel */
    .gs-upload-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .gs-upload-panel.open { display: block; animation: fadeIn 0.25s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .gs-upload-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .gs-drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    .gs-drop-zone:hover { border-color: var(--accent); background: rgba(200,150,74,0.03); }
    .gs-drop-zone .dz-icon { font-size: 24px; margin-bottom: 6px; color: var(--muted); }
    .gs-drop-zone .dz-text { font-size: 13px; color: var(--muted); }

    .gs-preview-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 14px;
    }

    .gs-preview-wrap img {
      max-height: 200px;
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
    }

    .gs-clear-preview {
      position: absolute;
      top: 6px; right: 6px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Item tag selector */
    .gs-tag-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .gs-item-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      max-height: 160px;
      overflow-y: auto;
    }

    .gs-item-chip {
      padding: 7px 14px;
      border-radius: 40px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .gs-item-chip.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,150,74,0.08);
    }

    .gs-item-chip.current-item {
      border-color: rgba(141,187,209,0.4);
      color: var(--accent2);
      background: rgba(141,187,209,0.06);
      cursor: default;
    }

    .gs-upload-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-gs-submit {
      padding: 12px 20px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-gs-submit:hover { opacity: 0.88; }
    .btn-gs-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-gs-cancel {
      padding: 12px 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-gs-cancel:hover { border-color: var(--muted); color: var(--text); }

    @media (max-width: 780px) {
      .group-shots-section { padding: 0 20px; }
      .gs-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }

    .lightbox-close {
      position: absolute;
      top: 20px; right: 24px;
      font-size: 28px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.15s;
    }

    .lightbox-close:hover { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 780px) {
      .topbar { padding: 12px 20px; }
      .item-page { padding: 28px 20px 60px; }
      .item-top { grid-template-columns: 1fr; gap: 28px; }
      .topbar-email { display: none; }
    }

    /* ── LIGHT THEME OVERRIDES ── */
    [data-theme="light"] {
      --bg:       #f4f1ec;
      --surface:  #ffffff;
      --surface2: #ebe8e2;
      --border:   #d6d1c8;
      --text:     #1c1a17;
      --muted:    #7a7570;
      --accent:   #b07d32;
      --accent2:  #4a8ba8;
      --danger:   #a03830;
      --input-bg: #f4f1ec;
    }

    html { transition: background 0.25s; }
    body { transition: background 0.25s, color 0.25s; }
    .topbar { transition: background 0.25s, border-color 0.25s; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="home.html" class="brand">Showoffy</a>
      <a href="my-items.html" class="back-link">← My Collection</a>
    </div>
    <div class="topbar-right">
      <span class="topbar-email" id="user-email"></span>
      <a href="dashboard.html" id="edit-btn" class="btn-small" style="display:none;">⋯ Edit</a>
      <a href="dashboard.html" class="btn-small">＋ Add Item</a>
      <button class="btn-small" id="signout-btn" style="display:none;">Sign Out</button>
    </div>
  </header>

  <div class="state-page" id="state-loading">
    <div class="big">⬡</div>
    Loading item…
  </div>

  <div class="state-page" id="state-error" style="display:none;">
    <div class="big">✕</div>
    <span id="error-msg">Item not found.</span>
    <a href="my-items.html" style="color:var(--accent);text-decoration:none;">← Back to collection</a>
  </div>

  <!-- Hidden file input for photo uploads -->
  <input type="file" id="photo-file-input" accept="image/*" multiple />

  <div class="item-page" id="item-page">
    <div class="item-top">

      <div class="gallery">
        <div class="gallery-main" id="gallery-main">
          <div class="no-image">◻</div>
        </div>
        <div class="gallery-thumbs" id="gallery-thumbs"></div>
        <div class="upload-status" id="upload-status"></div>
      </div>

      <div class="meta-panel">
        <div class="meta-eyebrow"  id="meta-category"></div>
        <div class="meta-title"    id="meta-brand"></div>
        <div class="meta-subtitle" id="meta-variant"></div>
        <div class="privacy-badge" id="privacy-badge"></div>
        <a id="add-similar-btn" href="#" class="add-similar-btn" style="display:none;">⊕ Add Similar</a>
        <div class="data-grid"     id="data-grid"></div>
        <div class="comments-block" id="comments-block" style="display:none;">
          <div class="comments-label">Notes</div>
          <div class="comments-text" id="comments-text"></div>
        </div>
      </div>

    </div>
  </div>
<div id="comments-section" style="max-width:1080px;margin:40px auto;padding:0 40px;">
  <h3 style="margin-bottom:16px;font-family:var(--font-primary);letter-spacing:.05em;">Comments</h3>

  <div id="comment-list"></div>
 <button 
    id="load-more-comments"
    style="display:none;margin-top:20px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;"
  >
    Load more
  </button>
  <textarea 
    id="comment-input" 
    maxlength="140"
    placeholder="Write a comment (max 140 characters)..."
    style="width:100%;margin-top:16px;padding:12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);"
  ></textarea>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
    <span id="char-count" style="font-size:11px;color:var(--muted);">0 / 140</span>
    <button 
      id="submit-comment"
      style="padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;"
    >
      Post
    </button>
  </div>

</div>
  <!-- ── GROUP SHOTS SECTION ── -->
  <div class="group-shots-section" id="group-shots-section" style="display:none;">

    <div class="gs-header">
      <div>
        <div class="gs-title">Group Shots</div>
        <div class="gs-subtitle">Photos containing this item alongside others</div>
      </div>
      <button class="btn-add-gs" id="btn-open-gs-upload" style="display:none;">＋ Add Group Shot</button>
    </div>

    <!-- Upload panel (hidden until button clicked) -->
    <div class="gs-upload-panel" id="gs-upload-panel">
      <label class="gs-upload-label">Photo</label>
      <div class="gs-drop-zone" id="gs-drop-zone">
        <div class="dz-icon">📷</div>
        <div class="dz-text">Tap to select a group photo</div>
      </div>
      <input type="file" id="gs-file-input" accept="image/*" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;" />
      <div id="gs-preview-container"></div>

      <label class="gs-tag-label">Items in this photo <span style="color:var(--muted);font-weight:300;text-transform:none;letter-spacing:0;">(tap to tag)</span></label>
      <div class="gs-item-list" id="gs-item-list"></div>

      <div class="gs-upload-actions">
        <button class="btn-gs-submit" id="btn-gs-submit" disabled>Save Group Shot</button>
        <button class="btn-gs-cancel" id="btn-gs-cancel">Cancel</button>
      </div>
    </div>

    <!-- Group shots grid -->
    <div id="gs-grid-container"></div>

  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script type="module">
    import { supabase } from "./supabaseClient.js";
    import { syncThemeFromUser } from "./theme.js";
    import { loadComments, submitComment } from './comments.js';

    const IMG_COLS = ["image_url1","image_url2","image_url3","image_url4","image_url5",
                      "image_url6","image_url7","image_url8","image_url9","image_url10"];
    const BUCKET = "item-images";

    let currentItemId  = null;
    let currentUserId  = null;
    let isOwner        = false;
    let activeImageUrl = null;

    // ── HELPER FUNCTIONS ──
    const escapeHtmlForGrid = (text) => {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    };

    // ── STATE HELPERS ──
    const showError = (msg) => {
      document.getElementById("state-loading").style.display = "none";
      document.getElementById("state-error").style.display   = "flex";
      document.getElementById("error-msg").textContent = msg;
    };

    const setUploadStatus = (type, msg) => {
      const el = document.getElementById("upload-status");
      el.className = `upload-status ${type}`;
      el.textContent = msg;
    };

    (async () => {

      // ── AUTH — optional for public items ──
      const { data: { session } } = await supabase.auth.getSession();
      const isLoggedIn = !!session;
      if (isLoggedIn) // Fetch fresh user_metadata from server so theme preference is always current
      supabase.auth.getUser().then(({ data: { user: freshUser } }) => {
        syncThemeFromUser(freshUser?.user_metadata);
      });

      if (isLoggedIn) {
        currentUserId = session.user.id;
        const emailEl = document.getElementById("user-email");
          // 🔹 Fetch username from profiles table
  const { data: profile, error } = await supabase
    .from("profiles")
    .select("username")
    .eq("id", session.user.id)
    .single();

  const username = profile?.username;
        emailEl.innerHTML = `<a href="account.html" style="color:var(--muted);text-decoration:none;transition:color .2s;"
          onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'"
          >${username || session.user.email}</a>`;
        document.getElementById("signout-btn").style.display = "inline-flex";
        document.getElementById("signout-btn").addEventListener("click", async () => {
          await supabase.auth.signOut();
          window.location.href = "login.html";
        });
      } else {
        // Show login link instead of email + signout
        document.getElementById("user-email").innerHTML =
          '<a href="login.html" style="color:var(--accent2);text-decoration:none;font-size:12px;">Sign In</a>';
        document.getElementById("signout-btn").style.display = "none";
      }

      // ── GET ID ──
      const params = new URLSearchParams(window.location.search);
      currentItemId = params.get("id");
      if (!currentItemId) { showError("No item ID provided."); return; }

      // ── FETCH ──
      const { data: item, error } = await supabase
        .from("items")
        .select(`
          id, maker_id, user_id, category_id, material_id,
          variant, size, msrp, born_on_date, deleted_at,
          image_url1, image_url2, image_url3, image_url4, image_url5,
          image_url6, image_url7, image_url8, image_url9, image_url10,
          is_private, comments, extra,
          brands     ( id, company, first_name, last_name ),
          categories ( name ),
          materials  ( name ),
          profiles:user_id ( username )
        `)
        .eq("id", currentItemId)
        .single();

      if (error || !item) {
        showError(error?.message || "Item not found or you don't have access.");
        return;
      }

      // If item is soft-deleted, only the owner may view it
      if (item.deleted_at && item.user_id !== currentUser?.id) {
        showError("This item is no longer available.");
        return;
      }

      isOwner = item.user_id === currentUserId;

      // Show edit button for owner
      if (isOwner) {
        const editBtn = document.getElementById("edit-btn");
        editBtn.href = `edit-item.html?id=${currentItemId}&from=item`;
        editBtn.style.display = "inline-flex";
      }

      // Add Similar button — available to all logged-in users (not just owner)
      const formMap = { 1: "form-atwood.html", 2: "form-horton.html", 3: "form-steelflame.html", 4: "form-zachwoods.html" };
      const targetForm = formMap[item.maker_id];
      if (targetForm) {
        const p = new URLSearchParams({ prefill: "1" });
        if (item.category_id)  p.set("category_id",  item.category_id);
        if (item.material_id)  p.set("material_id",   item.material_id);
        if (item.variant && item.variant !== "none") p.set("variant", item.variant);
        if (item.size)         p.set("size",          item.size);
        if (item.msrp)         p.set("msrp",          item.msrp);
        if (item.extra)        p.set("extra",         item.extra);
        if (item.is_private)   p.set("is_private",    "true");
        const addSimilarBtn = document.getElementById("add-similar-btn");
        addSimilarBtn.href = `${targetForm}?${p.toString()}`;
        addSimilarBtn.style.display = "inline-flex";
      }

      // ── SHOW PAGE ──
      document.title = `${item.brands?.company || "Item"} — Showoffy`;
      document.getElementById("state-loading").style.display = "none";
      document.getElementById("item-page").style.display     = "block";

      // Category
      document.getElementById("meta-category").textContent = item.categories?.name || "";

      // Brand (linked to maker page)
      const brandName = item.brands?.company || "Unknown Brand";
      const brandEl   = document.getElementById("meta-brand");
      if (item.maker_id) {
        brandEl.innerHTML = `<a href="maker.html?id=${item.maker_id}"
          style="color:inherit;text-decoration:none;border-bottom:2px solid rgba(200,150,74,0.35);
                 padding-bottom:2px;transition:border-color 0.2s;"
          onmouseover="this.style.borderColor='rgba(200,150,74,1)'"
          onmouseout="this.style.borderColor='rgba(200,150,74,0.35)'">${brandName}</a>`;
      } else {
        brandEl.textContent = brandName;
      }

      // Variant / material subtitle
      const variantText = [
        item.variant && item.variant !== "none" ? item.variant : null,
        item.materials?.name || null
      ].filter(Boolean).join(" · ");
      const subtitleEl = document.getElementById("meta-variant");
      if (variantText) { subtitleEl.textContent = variantText; }
      else             { subtitleEl.style.display = "none"; }

      // Privacy
      const badgeEl = document.getElementById("privacy-badge");
      badgeEl.className = `privacy-badge ${item.is_private ? "private" : "public"}`;
      badgeEl.innerHTML  = item.is_private ? "🔒 Private" : "◎ Public";

      // Data grid
      const gridEl  = document.getElementById("data-grid");
      const addCell = (label, value, full = false) => {
        if (!value && value !== 0) return;
        const cell = document.createElement("div");
        cell.className = `data-cell${full ? " full" : ""}`;
        cell.innerHTML = `<div class="data-label">${label}</div>
                          <div class="data-value${label === "MSRP" ? " price" : ""}">${value}</div>`;
        gridEl.appendChild(cell);
      };
      
      // Owner cell with clickable link
      if (item.profiles?.username) {
        const ownerCell = document.createElement("div");
        ownerCell.className = "data-cell";
        ownerCell.innerHTML = `<div class="data-label">Owner</div>
                               <div class="data-value"><a href="user.html?username=${encodeURIComponent(item.profiles.username)}" class="owner-link">${escapeHtmlForGrid(item.profiles.username)}</a></div>`;
        gridEl.appendChild(ownerCell);
      } else {
        addCell("Owner", "Unknown");
      }
      addCell("Brand",    item.brands?.company);
      addCell("Category", item.categories?.name);
      addCell("Material", item.materials?.name);
      addCell("Size",     item.size ? `${item.size}"` : null);
      addCell("MSRP",     item.msrp ? `$${parseFloat(item.msrp).toFixed(2)}` : null);
      if (isOwner) addCell("Date Acquired", item.born_on_date);
      addCell("Variant",  item.variant && item.variant !== "none" ? item.variant : null);
      addCell("Extra",    item.extra || null);

      // Comments
      if (item.comments && isOwner) {
        document.getElementById("comments-block").style.display = "block";
        document.getElementById("comments-text").textContent    = item.comments;
      }

      // ── BUILD GALLERY ──
      buildGallery(item);

    })(); // end init IIFE

    // ── GALLERY BUILDER ──
    function buildGallery(item) {
      const images   = IMG_COLS.map(c => item[c]).filter(Boolean);
      const mainEl   = document.getElementById("gallery-main");
      const thumbsEl = document.getElementById("gallery-thumbs");
      thumbsEl.innerHTML = "";

      const filledCount = images.length;
      const remaining   = 10 - filledCount;

      if (images.length === 0) {
        mainEl.innerHTML = `<div class="no-image">◻</div>`;
      } else {
        setMainImage(images[0], mainEl);
        activeImageUrl = images[0];

        images.forEach((url, i) => {
          const thumb = document.createElement("div");
          thumb.className = `thumb${i === 0 ? " active" : ""}`;
          thumb.innerHTML = `<img src="${url}" alt="" loading="lazy" />`;
          thumb.addEventListener("click", () => {
            document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
            thumb.classList.add("active");
            setMainImage(url, mainEl);
            activeImageUrl = url;
          });
          thumbsEl.appendChild(thumb);
        });
      }

      // Add-photo tile (only if owner and slots remain)
      if (isOwner && remaining > 0) {
        const addTile = document.createElement("div");
        addTile.className = "thumb-add";
        addTile.innerHTML = `<span class="plus">＋</span><span>${remaining} left</span>`;
        addTile.addEventListener("click", () => {
          const input = document.getElementById("photo-file-input");
          input.value = "";
          // Allow selecting up to `remaining` files
          input.multiple = remaining > 1;
          input.click();
        });
        thumbsEl.appendChild(addTile);
      }
    }

    function setMainImage(url, mainEl) {
      mainEl.innerHTML = `<img src="${url}" alt="" id="main-img" />`;
      mainEl.onclick   = () => window.openLightbox(url);
    }

    // ── PHOTO UPLOAD HANDLER ──
    document.getElementById("photo-file-input").addEventListener("change", async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      // Re-fetch current item to get latest filled slots
      const { data: current } = await supabase
        .from("items")
        .select(IMG_COLS.join(", "))
        .eq("id", currentItemId)
        .single();

      const existing = IMG_COLS.map(c => current?.[c]).filter(Boolean);
      const slots    = IMG_COLS.filter(c => !current?.[c]); // empty column names

      if (slots.length === 0) {
        setUploadStatus("error", "Maximum of 10 photos reached.");
        return;
      }

      const toUpload = files.slice(0, slots.length); // cap at available slots

      setUploadStatus("uploading", `Uploading ${toUpload.length} photo${toUpload.length > 1 ? "s" : ""}…`);

      try {
        const updates = {};

        for (let i = 0; i < toUpload.length; i++) {
          const file     = toUpload[i];
          const filename = `${currentUserId}/${Date.now()}-${i}-${file.name.replace(/\s+/g, "_")}`;

          const { error: uploadErr } = await supabase.storage
            .from(BUCKET)
            .upload(filename, file, { cacheControl: "3600", upsert: false });

          if (uploadErr) throw new Error(uploadErr.message);

          const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(filename);
          updates[slots[i]] = urlData.publicUrl;
        }

        // Save new URLs to database
        const { error: updateErr } = await supabase
          .from("items")
          .update(updates)
          .eq("id", currentItemId);

        if (updateErr) throw new Error(updateErr.message);

        setUploadStatus("success", `${toUpload.length} photo${toUpload.length > 1 ? "s" : ""} added!`);

        // Rebuild gallery with new images
        const { data: refreshed } = await supabase
          .from("items")
          .select(IMG_COLS.join(", ") + ", maker_id, user_id, category_id, material_id, is_private, variant, brands(company), categories(name), materials(name), comments, extra, size, msrp, born_on_date")
          .eq("id", currentItemId)
          .single();

        if (refreshed) buildGallery(refreshed);

        setTimeout(() => setUploadStatus("", ""), 3000);

      } catch (err) {
        setUploadStatus("error", "Upload failed: " + err.message);
      }
    });

    // ── LIGHTBOX ──
    window.openLightbox = (src) => {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").classList.add("open");
      document.body.style.overflow = "hidden";
    };

    window.closeLightbox = () => {
      document.getElementById("lightbox").classList.remove("open");
      document.body.style.overflow = "";
    };

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") window.closeLightbox();
    });

    // ── GROUP SHOTS ──────────────────────────────────────────────────────────
    (async () => {
      // Re-read session — may have changed since page load
      const { data: { session: gsSess } } = await supabase.auth.getSession();
      const gsUserId  = gsSess?.user?.id ?? null;
      const gsItemId  = new URLSearchParams(window.location.search).get("id");
      if (!gsItemId) return;

      const section    = document.getElementById("group-shots-section");
      const gridCont   = document.getElementById("gs-grid-container");
      const uploadBtn  = document.getElementById("btn-open-gs-upload");
      const uploadPanel = document.getElementById("gs-upload-panel");
      const dropZone   = document.getElementById("gs-drop-zone");
      const fileInput  = document.getElementById("gs-file-input");
      const previewCont = document.getElementById("gs-preview-container");
      const itemList   = document.getElementById("gs-item-list");
      const submitBtn  = document.getElementById("btn-gs-submit");
      const cancelBtn  = document.getElementById("btn-gs-cancel");

      let gsPendingFile = null;
      let gsTaggedIds   = new Set([parseInt(gsItemId)]); // current item pre-tagged

      section.style.display = "block";

      // ── Load and render group shots for this item ──
      async function loadGroupShots() {
        const { data: links } = await supabase
          .from("group_shot_items")
          .select("group_shot_id")
          .eq("item_id", gsItemId);

        if (!links?.length) {
          gridCont.innerHTML = '<div class="gs-empty">No group shots yet — add one to show this item with others.</div>';
          return;
        }

        const ids = links.map(l => l.group_shot_id);
        const { data: shots } = await supabase
          .from("group_shots")
          .select("id, url, created_at, user_id")
          .in("id", ids)
          .order("created_at", { ascending: false });

        if (!shots?.length) { gridCont.innerHTML = ""; return; }

        gridCont.innerHTML = "";
        const grid = document.createElement("div");
        grid.className = "gs-grid";

        shots.forEach(shot => {
          const card = document.createElement("div");
          card.className = "gs-card";
          card.style.cursor = "pointer";
          card.addEventListener("click", () => {
            window.location.href = `group-shot.html?id=${shot.id}&item=${gsItemId}`;
          });

          const img = document.createElement("img");
          img.src     = shot.url;
          img.alt     = "";
          img.loading = "lazy";
          card.appendChild(img);

          const footer = document.createElement("div");
          footer.className = "gs-card-footer";
          footer.innerHTML = `<span>${new Date(shot.created_at).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" })}</span>`;

          // Delete button for owner
          if (gsUserId && shot.user_id === gsUserId) {
            const delBtn = document.createElement("button");
            delBtn.className = "gs-delete-btn";
            delBtn.title     = "Delete group shot";
            delBtn.innerHTML = "⊘";
            delBtn.addEventListener("click", async (e) => {
              e.stopPropagation();
              const ok = await showGsConfirm();
              if (!ok) return;
              await supabase.from("group_shots").delete().eq("id", shot.id);
              loadGroupShots();
            });
            footer.appendChild(delBtn);
          }

          card.appendChild(footer);
          grid.appendChild(card);
        });

        gridCont.appendChild(grid);
      }

      await loadGroupShots();

      // Show upload button for logged-in owners of the current item
      // (we check user_id against currentItem via the isOwner flag set in main IIFE)
      if (gsUserId) {
        uploadBtn.style.display = "inline-flex";
      }

      // ── Upload panel toggle ──
      uploadBtn.addEventListener("click", async () => {
        uploadPanel.classList.toggle("open");
        if (uploadPanel.classList.contains("open")) await loadItemChips();
      });

      cancelBtn.addEventListener("click", () => {
        uploadPanel.classList.remove("open");
        resetUploadPanel();
      });

      // ── File selection ──
      dropZone.addEventListener("click", () => { fileInput.value = ""; fileInput.click(); });
      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;
        gsPendingFile = file;
        previewCont.innerHTML = "";
        const wrap = document.createElement("div");
        wrap.className = "gs-preview-wrap";
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        const clr = document.createElement("button");
        clr.className = "gs-clear-preview";
        clr.innerHTML = "✕";
        clr.addEventListener("click", () => { gsPendingFile = null; previewCont.innerHTML = ""; submitBtn.disabled = true; });
        wrap.appendChild(img);
        wrap.appendChild(clr);
        previewCont.appendChild(wrap);
        submitBtn.disabled = false;
      });

      // ── Load owner's items as tag chips ──
      async function loadItemChips() {
        if (!gsUserId) return;
        itemList.innerHTML = '<span style="font-size:13px;color:var(--muted)">Loading your items…</span>';

        const { data: items } = await supabase
          .from("items")
          .select("id, variant, maker_id, categories(name), brands(company)")
          .eq("user_id", gsUserId)
          .is("deleted_at", null)
          .order("created_at", { ascending: false });

        itemList.innerHTML = "";
        (items || []).forEach(it => {
          const label = [it.brands?.company, it.categories?.name, it.variant].filter(Boolean).join(" · ");
          const chip  = document.createElement("div");
          chip.className   = parseInt(it.id) === parseInt(gsItemId)
            ? "gs-item-chip current-item selected"
            : "gs-item-chip" + (gsTaggedIds.has(it.id) ? " selected" : "");
          chip.textContent = label || `Item #${it.id}`;
          chip.dataset.id  = it.id;

          if (parseInt(it.id) !== parseInt(gsItemId)) {
            chip.addEventListener("click", () => {
              if (gsTaggedIds.has(it.id)) {
                gsTaggedIds.delete(it.id);
                chip.classList.remove("selected");
              } else {
                gsTaggedIds.add(it.id);
                chip.classList.add("selected");
              }
            });
          }
          itemList.appendChild(chip);
        });
      }

      // ── Submit group shot ──
      submitBtn.addEventListener("click", async () => {
        if (!gsPendingFile || !gsUserId) return;
        submitBtn.disabled = true;
        submitBtn.textContent = "Uploading…";

        try {
          // Upload to Storage
          const ext  = gsPendingFile.name.split(".").pop();
          const path = `${gsUserId}/group-shots/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const { error: upErr } = await supabase.storage
            .from("item-images")
            .upload(path, gsPendingFile, { cacheControl: "3600", upsert: false });
          if (upErr) throw upErr;
          const { data: urlData } = supabase.storage.from("item-images").getPublicUrl(path);

          // Insert group_shots row
          const { data: gs, error: gsErr } = await supabase
            .from("group_shots")
            .insert([{ user_id: gsUserId, url: urlData.publicUrl }])
            .select()
            .single();
          if (gsErr) throw gsErr;

          // Insert junction rows for all tagged items
          const tagRows = Array.from(gsTaggedIds).map(itemId => ({
            group_shot_id: gs.id,
            item_id: itemId,
          }));
          const { error: tagErr } = await supabase.from("group_shot_items").insert(tagRows);
          if (tagErr) throw tagErr;

          uploadPanel.classList.remove("open");
          resetUploadPanel();
          await loadGroupShots();

        } catch (err) {
          alert("Upload failed: " + err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = "Save Group Shot";
        }
      });

      function resetUploadPanel() {
        gsPendingFile = null;
        gsTaggedIds   = new Set([parseInt(gsItemId)]);
        previewCont.innerHTML = "";
        itemList.innerHTML    = "";
        submitBtn.disabled    = true;
        submitBtn.textContent = "Save Group Shot";
        fileInput.value       = "";
      }

      // Simple confirm for delete
      function showGsConfirm() {
        return new Promise(resolve => {
          const overlay = document.createElement("div");
          overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10000;display:flex;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom)";
          overlay.innerHTML = `<div style="background:#1e1e22;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 24px 32px;width:100%;max-width:520px;">
            <div style="font-family:var(--font-primary);font-size:22px;letter-spacing:.06em;margin-bottom:8px;">Delete Group Shot</div>
            <p style="font-size:14px;color:var(--muted);margin-bottom:24px;">This group shot will be permanently removed.</p>
            <div style="display:flex;gap:10px;">
              <button id="gs-cancel-del" style="flex:1;padding:14px;border-radius:10px;background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--font-body);font-size:15px;cursor:pointer;">Cancel</button>
              <button id="gs-confirm-del" style="flex:2;padding:14px;border-radius:10px;background:var(--danger);border:none;color:#fff;font-family:var(--font-body);font-size:15px;font-weight:700;cursor:pointer;">Delete</button>
            </div>
          </div>`;
          document.body.appendChild(overlay);
          const close = v => { overlay.style.opacity="0"; overlay.style.transition="opacity .18s"; setTimeout(()=>overlay.remove(),180); resolve(v); };
          overlay.querySelector("#gs-cancel-del").onclick  = () => close(false);
          overlay.querySelector("#gs-confirm-del").onclick = () => close(true);
          overlay.addEventListener("click", e => { if(e.target===overlay) close(false); });
        });
      }

    })();
 window.addEventListener('DOMContentLoaded', () => {
  const entityId = new URLSearchParams(window.location.search).get('id');
  const entityType = "item";

  if (!entityId) return;

  loadComments(entityId, entityType, true);

  document.getElementById('submit-comment')
    .addEventListener('click', () => {
      submitComment(entityId, entityType);
    });

  document.getElementById('load-more-comments')
    .addEventListener('click', () => {
      loadComments(entityId, entityType, false);
    });

  // Character counter
  const input = document.getElementById('comment-input');
  const counter = document.getElementById('char-count');

  input.addEventListener('input', () => {
    counter.textContent = `${input.value.length} / 140`;
  });
});
