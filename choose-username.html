<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a Username — EDC Project</title>
  <style>
    :root {
      --font-primary: 'Bebas Neue', sans-serif;
      --font-body:    'Lato', sans-serif;
      --font-accent:  'Cormorant Garamond', serif;
      --bg: #0f0f0f;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #f0ede8;
      --muted: #888;
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.12);
      --error: #e07070;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body), sans-serif;
      font-weight: 300;
      display: grid;
      place-items: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(201,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,169,110,0.04) 0%, transparent 50%);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 44px 40px 40px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wordmark {
      font-family: var(--font-accent), serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    h1 {
      font-family: var(--font-accent), serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* Provider badge */
    .provider-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px 5px 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .provider-badge svg { flex-shrink: 0; }
    .provider-badge span { color: var(--text); font-weight: 400; }

    /* Form fields */
    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
      user-select: none;
    }

    input {
      width: 100%;
      padding: 12px 14px 12px 28px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body), sans-serif;
      font-size: 15px;
      font-weight: 300;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input::placeholder { color: #444; }

    /* Availability indicator */
    .availability {
      margin-top: 7px;
      font-size: 12px;
      min-height: 16px;
      transition: opacity 0.2s;
    }

    .availability.checking { color: var(--muted); }
    .availability.available { color: #7ec89e; }
    .availability.taken { color: var(--error); }

    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body), sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status / error */
    .status-msg {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      line-height: 1.5;
    }

    .status-msg.error {
      display: block;
      background: rgba(224,112,112,0.1);
      border: 1px solid rgba(224,112,112,0.3);
      color: var(--error);
    }

    .status-msg.success {
      display: block;
      background: var(--accent-dim);
      border: 1px solid rgba(201,169,110,0.3);
      color: var(--accent);
    }

    .status-msg.info {
      display: block;
      background: rgba(141,187,209,0.08);
      border: 1px solid rgba(141,187,209,0.25);
      color: #8dbbd1;
    }

    /* Username rules hint */
    .rules {
      margin-top: 8px;
      font-size: 11px;
      color: #555;
      line-height: 1.6;
    }

    /* Loading spinner */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(15,15,15,0.3);
      border-top-color: #0f0f0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* Full-screen loading overlay (shown while detecting session) */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.3s;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 4px;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<!-- Session detection overlay -->
<div id="loading-overlay">
  <div style="display:flex;">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<div class="card" id="main-card" style="display:none;">
  <div class="wordmark">EDC Project</div>
  <h1>One last <em>step.</em></h1>
  <p class="subtitle">Choose a username for your account. This is how you'll appear across the community.</p>

  <!-- Dynamically filled with the OAuth provider badge -->
  <div id="provider-badge-wrap"></div>

  <div class="field">
    <label for="username">Username</label>
    <div class="input-wrap">
      <span class="input-prefix">@</span>
      <input
        type="text"
        id="username"
        placeholder="yourhandle"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        maxlength="30"
      />
    </div>
    <div class="availability" id="availability"></div>
    <div class="rules">3–30 characters · letters, numbers, underscores &amp; hyphens only</div>
  </div>

  <button class="btn-primary" id="submit-btn" onclick="handleSubmit()">Claim Username</button>

  <div class="status-msg" id="status"></div>
</div>

<script type="module">
  import { supabase } from "./supabaseClient.js";

  // ─── UTILITY ─────────────────────────────────────────────────────────────────

  function showStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status-msg " + type;
  }

  function clearStatus() {
    const el = document.getElementById("status");
    el.textContent = "";
    el.style.display = "none";
  }

  function setLoading(loading) {
    const btn = document.getElementById("submit-btn");
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner"></span> Saving…`
      : "Claim Username";
  }

  // ─── PROVIDER BADGE ──────────────────────────────────────────────────────────

  const PROVIDER_META = {
    google: {
      label: "Signed in with Google",
      svg: `<svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>`,
    },
    facebook: {
      label: "Signed in with Facebook",
      svg: `<svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <path d="M18 9a9 9 0 1 0-10.406 8.892V11.59H5.309V9h2.285V7.02c0-2.255 1.344-3.5 3.4-3.5.984 0 2.015.176 2.015.176v2.215h-1.135c-1.119 0-1.468.695-1.468 1.407V9h2.498l-.399 2.59H10.406v6.302A9.003 9.003 0 0 0 18 9z" fill="#1877F2"/>
        <path d="M12.505 11.59l.399-2.59h-2.498V7.318c0-.712.349-1.407 1.468-1.407h1.135V3.696s-1.031-.176-2.015-.176c-2.056 0-3.4 1.245-3.4 3.5V9H5.309v2.59h2.285v6.302a9.07 9.07 0 0 0 2.812 0V11.59h2.099z" fill="white"/>
      </svg>`,
    },
  };

  function renderProviderBadge(provider) {
    const meta = PROVIDER_META[provider] || { label: "Signed in via OAuth", svg: "" };
    document.getElementById("provider-badge-wrap").innerHTML = `
      <div class="provider-badge">
        ${meta.svg}
        <span>${meta.label}</span>
      </div>
    `;
  }

  // ─── SESSION GUARD ────────────────────────────────────────────────────────────
  // Wait for the OAuth callback to finish resolving the session, then verify:
  //   1. User is actually logged in
  //   2. User does NOT already have a username (guard against revisiting the page)

  let currentUser = null;

  async function init() {
    // exchangeCodeForSession handles the PKCE code if present in the URL
    const { data: { session }, error: sessionError } =
      await supabase.auth.getSession();

    if (sessionError || !session) {
      // No session — send back to login
      window.location.href = "login.html";
      return;
    }

    currentUser = session.user;

    // Check if this user already has a username in the profiles table
    const { data: profile } = await supabase
      .from("profiles")
      .select("username")
      .eq("id", currentUser.id)
      .maybeSingle();

    if (profile?.username) {
      // Already has a username — go straight to home
      window.location.href = "home.html";
      return;
    }

    // Render provider badge based on the identity provider
    const provider = currentUser.app_metadata?.provider || "google";
    renderProviderBadge(provider);

    // Show the card, hide the loading overlay
    document.getElementById("loading-overlay").classList.add("hidden");
    document.getElementById("main-card").style.display = "block";
  }

  init();

  // ─── USERNAME VALIDATION & AVAILABILITY ──────────────────────────────────────

  const USERNAME_RE = /^[a-zA-Z0-9_-]{3,30}$/;
  let debounceTimer = null;

  document.getElementById("username").addEventListener("input", (e) => {
    const val = e.target.value.trim();
    const avEl = document.getElementById("availability");
    clearStatus();

    if (!val) { avEl.textContent = ""; avEl.className = "availability"; return; }

    if (!USERNAME_RE.test(val)) {
      avEl.textContent = "Only letters, numbers, _ and - allowed (3–30 chars).";
      avEl.className = "availability taken";
      return;
    }

    avEl.textContent = "Checking availability…";
    avEl.className = "availability checking";

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => checkAvailability(val), 500);
  });

  async function checkAvailability(username) {
    const avEl = document.getElementById("availability");
    const { data } = await supabase
      .from("profiles")
      .select("username")
      .eq("username", username)
      .maybeSingle();

    if (data) {
      avEl.textContent = `@${username} is already taken.`;
      avEl.className = "availability taken";
    } else {
      avEl.textContent = `@${username} is available!`;
      avEl.className = "availability available";
    }
  }

  // ─── SUBMIT ───────────────────────────────────────────────────────────────────

  window.handleSubmit = async function () {
    if (!currentUser) {
      showStatus("Session expired. Please sign in again.", "error");
      return;
    }

    const username = document.getElementById("username").value.trim();

    if (!username) {
      showStatus("Please enter a username.", "error");
      return;
    }

    if (!USERNAME_RE.test(username)) {
      showStatus("Username can only contain letters, numbers, underscores and hyphens (3–30 characters).", "error");
      return;
    }

    setLoading(true);

    // Final availability check before writing
    const { data: existing } = await supabase
      .from("profiles")
      .select("username")
      .eq("username", username)
      .maybeSingle();

    if (existing) {
      showStatus(`@${username} was just taken. Please choose another.`, "error");
      setLoading(false);
      return;
    }

    // Upsert the profile row (insert or update if row already exists for this user)
    const { error } = await supabase
      .from("profiles")
      .upsert({
        id: currentUser.id,
        username: username,
        email: currentUser.email,
        updated_at: new Date().toISOString(),
      });

    if (error) {
      // Handle unique constraint violation (race condition)
      if (error.code === "23505") {
        showStatus(`@${username} was just taken. Please choose another.`, "error");
      } else {
        showStatus("Something went wrong: " + error.message, "error");
      }
      setLoading(false);
      return;
    }

    // Also persist username into auth user_metadata so other parts of the app can read it
    await supabase.auth.updateUser({ data: { username } });

    showStatus("Username saved! Redirecting you now…", "success");
    setTimeout(() => { window.location.href = "home.html"; }, 1200);
  };
</script>

</body>
</html>
