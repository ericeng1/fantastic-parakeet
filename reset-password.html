<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reset Password — Showoffy</title>
  <script>
    (function() {
      var t = localStorage.getItem("showoffy_theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    :root,
    [data-theme="dark"] {
      --font-primary: 'Bebas Neue', sans-serif;
      --font-body:    'Lato', sans-serif;
      --font-accent:  'Cormorant Garamond', serif;
      --bg:       #0f0f10;
      --surface:  #18181b;
      --border:   #2a2a2e;
      --text:     #f0ede8;
      --muted:    #9a9896;
      --accent:   #c8964a;
      --success:  #5a9e6f;
      --danger:   #b85450;
      --input-bg: #0f0f10;
    }

    [data-theme="light"] {
      --bg:       #f4f1ec;
      --surface:  #ffffff;
      --border:   #d6d1c8;
      --text:     #1c1a17;
      --muted:    #7a7570;
      --accent:   #b07d32;
      --success:  #3d7a52;
      --danger:   #a03830;
      --input-bg: #f4f1ec;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-family: var(--font-primary);
      font-size: 26px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
      display: block;
      margin-bottom: 6px;
    }

    .page-title {
      font-family: var(--font-primary);
      font-size: 28px;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .page-sub {
      font-family: var(--font-accent);
      font-style: italic;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }

    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,150,74,0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover    { opacity: 0.87; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.4;
    }

    .status-msg.error   { background: rgba(184,84,80,0.1);  border: 1px solid rgba(184,84,80,0.3);  color: var(--danger); }
    .status-msg.success { background: rgba(90,158,111,0.1); border: 1px solid rgba(90,158,111,0.3); color: var(--success); }
    .status-msg.show    { display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    /* Success state */
    .success-state {
      text-align: center;
      display: none;
      padding: 8px 0;
    }

    .success-state.show { display: block; }

    .success-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .success-title {
      font-family: var(--font-primary);
      font-size: 28px;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    @media (max-width: 440px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <a href="home.html" class="logo">Showoffy</a>

    <!-- Reset form (shown when valid recovery session exists) -->
    <div id="reset-form">
      <div class="page-title">New Password</div>
      <div class="page-sub">Choose a new password for your account</div>

      <div class="status-msg" id="status-msg"></div>

      <div class="field">
        <label class="field-label" for="new-pw">New Password</label>
        <input type="password" class="field-input" id="new-pw"
               placeholder="Minimum 8 characters" autocomplete="new-password" />
      </div>

      <div class="field">
        <label class="field-label" for="confirm-pw">Confirm Password</label>
        <input type="password" class="field-input" id="confirm-pw"
               placeholder="Re-enter password" autocomplete="new-password" />
      </div>

      <button class="btn-primary" id="reset-btn">Set New Password</button>
      <a href="login.html" class="back-link">← Back to Sign In</a>
    </div>

    <!-- Success state -->
    <div class="success-state" id="success-state">
      <div class="success-icon">✓</div>
      <div class="success-title">Password Updated</div>
      <p class="success-sub">Your password has been changed. You're now signed in.</p>
      <a href="home.html" class="btn-primary" style="text-decoration:none;display:block;text-align:center;">
        Continue to Showoffy
      </a>
    </div>

    <!-- Error state (invalid/expired link) -->
    <div id="error-state" style="display:none;text-align:center;padding:8px 0;">
      <div style="font-size:40px;margin-bottom:16px;">✕</div>
      <div class="page-title">Link Expired</div>
      <p class="page-sub">This password reset link is invalid or has expired.</p>
      <a href="login.html" class="btn-primary"
         style="text-decoration:none;display:block;text-align:center;margin-top:20px;">
        Request a New Link
      </a>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabaseClient.js";

    function showStatus(msg, type) {
      const el = document.getElementById("status-msg");
      el.textContent = msg;
      el.className   = `status-msg ${type} show`;
    }

    // ── Listen for PASSWORD_RECOVERY event ──
    // Supabase fires this when the user arrives via the reset email link.
    // The session is established automatically from the URL hash.
    const { data: { subscription } } = supabase.auth.onAuthStateChange(
      async (event, session) => {
        if (event === "PASSWORD_RECOVERY") {
          // Valid recovery session — show the reset form
          document.getElementById("reset-form").style.display    = "block";
          document.getElementById("error-state").style.display   = "none";
        } else if (event === "SIGNED_IN" && !session) {
          // No session and not a recovery — show error
          document.getElementById("reset-form").style.display    = "none";
          document.getElementById("error-state").style.display   = "block";
        }
      }
    );

    // On load, check if we already have a session from the URL hash
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      // No session yet — may still arrive via PASSWORD_RECOVERY event above
      // Show form optimistically; if the event never fires, leave it
    }

    // ── Handle form submission ──
    document.getElementById("reset-btn").addEventListener("click", async () => {
      const pw   = document.getElementById("new-pw").value;
      const conf = document.getElementById("confirm-pw").value;
      const btn  = document.getElementById("reset-btn");

      if (!pw || pw.length < 8) {
        showStatus("Password must be at least 8 characters", "error"); return;
      }
      if (pw !== conf) {
        showStatus("Passwords don't match", "error"); return;
      }

      btn.disabled    = true;
      btn.textContent = "Updating…";

      const { error } = await supabase.auth.updateUser({ password: pw });

      if (error) {
        showStatus("Update failed: " + error.message, "error");
        btn.disabled    = false;
        btn.textContent = "Set New Password";
      } else {
        subscription.unsubscribe();
        document.getElementById("reset-form").classList.add("hide");
        document.getElementById("reset-form").style.display  = "none";
        document.getElementById("success-state").style.display = "block";
        document.getElementById("success-state").classList.add("show");
      }
    });
  </script>

</body>
</html>
